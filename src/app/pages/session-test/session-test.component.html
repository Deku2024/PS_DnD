<div class="container">
  <h2>⚔ Sesiones de Juego</h2>
  <p class="subtitle">Dungeons &amp; Dragons</p>

  <p class="uid" *ngIf="currentUser">
    Aventurero: <strong>{{ currentUser.displayName }}</strong>
  </p>
  <p class="uid error" *ngIf="!currentUser">
    ⚠️ No hay usuario autenticado.
  </p>

  <hr class="divider" />

  <!-- Mis partidas -->
  <div class="card">
    <h3>Mis partidas</h3>
    <button
      class="btn-toggle-sessions"
      (click)="toggleMySessions()"
      [disabled]="mySessionsLoading"
    >
      {{ mySessionsLoading ? 'Cargando...' : (showMySessions ? '▲ Ocultar partidas' : '▼ Ver mis partidas') }}
    </button>
    <div class="my-sessions-list" *ngIf="showMySessions && !mySessionsLoading">
      <p class="empty-sessions" *ngIf="mySessions.length === 0">
        Aún no te has unido a ninguna partida.
      </p>
      <div
        *ngFor="let s of mySessions"
        class="session-row"
      >
        <div class="session-info">
          <span class="session-name">{{ s.name }}</span>
          <div class="session-meta">
            <span class="badge-master" *ngIf="currentUser && s.masterId === currentUser.uid">👑 Master</span>
            <span class="meta-sep" *ngIf="currentUser && s.masterId === currentUser.uid"></span>
            <span class="session-badge badge-{{ s.status }}">{{ s.status }}</span>
          </div>
        </div>
        <button class="btn-enter" (click)="enterSession(s.id!)">Entrar</button>
      </div>
    </div>
  </div>

  <!-- Crear sesión -->
  <div class="card">
    <h3>Crear sesión</h3>
    <input [(ngModel)]="sessionName" placeholder="Nombre de la sesión" />
    <input [(ngModel)]="sessionPassword" type="password" placeholder="Contraseña de la sesión" />
    <button (click)="onCreate()" [disabled]="!currentUser">Crear sesión</button>
  </div>

  <!-- Unirse a sesión -->
  <div class="card">
    <h3>Unirse a sesión</h3>
    <input [(ngModel)]="joinCode" placeholder="Código de sesión (ej: 123456)" style="text-transform: uppercase" />
    <input [(ngModel)]="joinPassword" type="password" placeholder="Contraseña" />
    <button (click)="onJoin()" [disabled]="!currentUser">Unirse</button>
  </div>

  <!-- Mensaje -->
  <p class="message" *ngIf="message" [class.error]="isError">{{ message }}</p>

  <!---Botón para acceder al bestiario-->
  <button (click)="enterMonsterPage()" [disabled]="!currentUser">Ver mi bestiario</button>

</div>
