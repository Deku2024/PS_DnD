<main>
  <div class="dm-control-panel">
    <div class="panel-info">
      <h2>Mesa del Dungeon Master</h2>
      <span class="status-badge" [ngClass]="sessionStatus">
                Estado: {{ sessionStatus | uppercase }}
            </span>
    </div>

    <button
      class="btn-toggle"
      [ngClass]="sessionStatus === 'paused' || sessionStatus === 'waiting' ? 'btn-resume' : 'btn-pause'"
      (click)="toggleSessionStatus()">
      {{ sessionStatus === 'paused' || sessionStatus === 'waiting' ? '▶️ REANUDAR PARTIDA' : '⏸️ PAUSAR PARTIDA' }}
    </button>
  </div>

  @if (maxNotesExceeded) {
    <div class="error">
      <span>Ha alcanzado el número máximo de notas</span>
    </div>
  }

  <general-throw-component />

  <div id="create-note">
    <button (click)="addNote()" class="add-btn" [disabled]="maxNotesExceeded">
      <span>+</span>
    </button>
  </div>

  <div id="notes-area">
    @for (note of notes; track note.id) {
      <app-note
        [note]="note"
        (delete)="deleteNote($event)"
        (update)="updateNote($event)"
      ></app-note>
    }
  </div>

  <result-frame />
</main>
