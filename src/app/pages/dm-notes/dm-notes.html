<main>
  <div id="top-bar">
    <button class="back-btn" (click)="goToSession()">← Volver a la sesión</button>
  </div>

  @if (maxNotesExceeded) {
    <div class="error">
      <span>Ha alcanzado el número máximo de notas</span>
    </div>
  }

  <general-throw-component />

  <div id="create-note">
    <div class="sort-container">
      <label for="sort-notes">Ordenar por:</label>
      <select id="sort-notes" [(ngModel)]="sortCriteria" (change)="sortNotes()" class="sort-select">
        <option value="newest">Más recientes</option>
        <option value="oldest">Más antiguas</option>
        <option value="alphaAsc">Alfabético (A-Z)</option>
        <option value="alphaDesc">Alfabético (Z-A)</option>
      </select>
    </div>

    <button (click)="addNote()" class="add-btn" [disabled]="maxNotesExceeded">
      <span>+</span>
    </button>
  </div>

  <div id="notes-area">
    @for (note of notes; track $index) {
      <app-note
        [note]="note"
        [sessionId]="sessionId"
        (delete)="deleteNote($event)"
      ></app-note>
    }
  </div>

  <result-frame />

  <div class="dm-history-hidden-host" *ngIf="session && currentUser">
    <history-button-component
      [isMaster]="isMaster"
      [currentUserId]="currentUser.uid"
      [sessionId]="session.id || ''"
      [sessionName]="session.name"
      [masterId]="session.masterId"
      [masterName]="session.playersUsernames[session.masterId] || session.masterId"
      [players]="session.players"
      [playerEmails]="session.playerEmails"
      [playerUsernames]="session.playersUsernames">
    </history-button-component>
  </div>

  <app-dm-floating-menu
    [sessionId]="sessionId"
    [isBattleActive]="true"
    [showLocalActions]="false"
    (historyClick)="triggerHistoryDrawer()">
  </app-dm-floating-menu>

</main>
