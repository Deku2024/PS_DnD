<main>
    <form>
        <label class="field">
            <div id="name-input">
                <input type="text" name="name" [(ngModel)]="name" placeholder="Volgrum">
            </div>
        </label>

        <label class="field">
            <div id="age-input">
                <input type="number" name="age" [(ngModel)]="age" placeholder="100">
            </div>
        </label>
        

        <label class="field">
            <div id="experience-input">
                <input type="number" name="exp" [(ngModel)]="experience" placeholder="30">
            </div>
        </label>

        <label class="field">
            <div id="life-input">
                <input type="number" name="life" [(ngModel)]="life" placeholder="42">
            </div>
        </label>

        <label class="field">
            <div id="maxlife-input">
                <input type="number" name="maxlife" [(ngModel)]="maxLife" placeholder="100">
            </div>
        </label>

        <label class="field">
            <div id="templife-input">
                <input type="number" name="templife" [(ngModel)]="tempLife" placeholder="90">
            </div>
        </label>

        <label class="field">
            <div id="armourClass-input">
                <input type="number" name="armourClass" [(ngModel)]="armourClass" placeholder="42">
            </div>
        </label>

        <label class="field">
            <div id="classHabilites-input">
                <input type="text" name="classHabilities" [(ngModel)]="classHabilities">
            </div>
        </label>



    </form>
</main>
