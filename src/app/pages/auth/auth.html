<div class="auth-hero">
	<div class="auth-card">
		<header class="card-header">
			<div class="brand">PS<span class="accent">_DnD</span></div>
			<h2>{{ isLogin ? 'Welcome back' : 'Create your account' }}</h2>
			<p class="subtitle">{{ isLogin ? 'Sign in to continue to your campaign' : 'Sign up to start playing' }}</p>
		</header>

		<form class="card-form" (ngSubmit)="submit()">
			<label class="field">
				<span class="label-text">Email</span>
				<div class="input-row">
					<input type="email" [(ngModel)]="email" name="email" required placeholder="you@domain.com" />
				</div>
			</label>

			<label class="field">
				<span class="label-text">Password</span>
				<div class="input-row">
					<input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required minlength="6" placeholder="••••••••" />
					<button type="button" class="eye" (click)="togglePassword()" aria-label="Toggle password" [attr.aria-pressed]="showPassword">
						<svg *ngIf="!showPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
							<path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
							<circle cx="12" cy="12" r="2.5" />
						</svg>
						<svg *ngIf="showPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
							<path d="M2 2l20 20-1.4 1.4L18 19.8C16.6 20.5 14.9 21 12 21c-7 0-11-7-11-7 1.5-2.6 3.9-4.9 6.6-6.1L.6 3.4 2 2zm7.1 7.1A4 4 0 0 0 12 14c.7 0 1.4-.2 2-.6l-4.9-4.3zM12 5c3.5 0 6.6 1.7 8.8 4.5l-2.1 1.8C17.7 9.3 15 8 12 8c-1 0-1.9.1-2.8.4L7.1 6.9C8.2 6.6 10 5 12 5z"/>
						</svg>
					</button>
				</div>
			</label>

			<label class="field" *ngIf="!isLogin">
				<span class="label-text">Confirm password</span>
				<div class="input-row">
					<input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="6" placeholder="••••••••" />
				</div>
			</label>

			<div class="actions">
				<button class="primary" type="submit" [disabled]="loading">
					<span *ngIf="!loading">{{ isLogin ? 'Sign in' : 'Create account' }}</span>
					<span *ngIf="loading" class="loader"></span>
				</button>
				<button type="button" class="ghost" (click)="toggle()">{{ isLogin ? 'Create an account' : 'Have an account? Sign in' }}</button>
			</div>
		</form>

		<p class="error" *ngIf="error">{{ error }}</p>
		<p class="info" *ngIf="!error && !loading && success">{{ success }}</p>
	</div>
</div>
