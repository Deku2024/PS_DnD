<div class="home-container">
  <h1>Home</h1>
  <p class="welcome">Welcome! You are signed in.</p>
  <div class="home-actions">
    <button class="btn-signout" (click)="signOut()" [disabled]="loading">{{ loading ? 'Signing out...' : 'Sign out' }}</button>
  </div>



  <d20-roller [rollingForCharacteristic]="true" [charValue]="10" [dc]="15" ]></d20-roller>

  <single-custom-throw-button [dataThrow]="'4d4 + 5'" />
  <general-throw-component />
  <result-frame />

</div>
<p>home works!</p>
